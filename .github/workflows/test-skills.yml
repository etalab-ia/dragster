name: Test Dragster Skills

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SKILL.md format
        run: |
          find skills -name "SKILL.md" | while read skill_file; do
            echo "Checking $skill_file..."
            # Check for required frontmatter (name, description) and optional enabled field
            if ! grep -q "^name:" "$skill_file"; then
              echo "❌ Missing 'name' in frontmatter: $skill_file"
              exit 1
            fi
            if ! grep -q "^description:" "$skill_file"; then
              echo "❌ Missing 'description' in frontmatter: $skill_file"
              exit 1
            fi
            # Check for enabled field (optional, defaults to true if missing)
            if grep -q "^enabled:" "$skill_file"; then
              enabled_value=$(grep "^enabled:" "$skill_file" | cut -d' ' -f2)
              if [ "$enabled_value" != "true" ] && [ "$enabled_value" != "false" ]; then
                echo "❌ Invalid 'enabled' value in $skill_file: must be 'true' or 'false'"
                exit 1
              fi
              echo "  ✓ enabled=$enabled_value"
            else
              echo "  ✓ enabled=true (default)"
            fi
            echo "✓ $skill_file valid"
          done

      - name: Setup runtime skill symlinks
        run: |
          # Create .skills directory with individual symlinks
          mkdir -p .skills
          for skill in skills/*/; do
            skill_name=$(basename "$skill")
            ln -s "../skills/$skill_name" ".skills/$skill_name"
          done
          # Create .agents/skills symlink for Vercel CLI
          mkdir -p .agents
          ln -s ../skills .agents/skills
          echo "✓ Runtime symlinks created"

      - name: Validate workspace symlink strategy
        run: |
          # .skills is a real directory (not a symlink)
          if ! test -d .skills; then
            echo "❌ .skills must be a directory"
            exit 1
          fi
          if test -L .skills; then
            echo "❌ .skills should be a directory, not a symlink"
            exit 1
          fi
          # Individual skill symlinks inside .skills/
          for skill in rag-parse rag-search rag-index rag-tracking; do
            if ! test -L ".skills/$skill"; then
              echo "❌ .skills/$skill must be a symlink"
              exit 1
            fi
          done
          # .agents/skills remains a symlink to ../skills
          test -L .agents/skills || (echo "❌ .agents/skills must be a symlink" && exit 1)
          test "$(readlink .agents/skills)" = "../skills" || (echo "❌ .agents/skills should link to ../skills" && exit 1)
          echo "✓ workspace skill symlinks valid"

  integration-letta-evals:
    # Optional: only runs when secrets are configured.
    # Secrets are checked at step level (not available at job-level if).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if secrets are configured
        id: check-secrets
        env:
          LETTA_API_KEY: ${{ secrets.LETTA_API_KEY }}
          LETTA_PROJECT_ID: ${{ secrets.LETTA_PROJECT_ID }}
          AGENT_ID: ${{ secrets.AGENT_ID }}
        run: |
          if [ -n "$LETTA_API_KEY" ] && [ -n "$LETTA_PROJECT_ID" ] && [ -n "$AGENT_ID" ]; then
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping integration tests - secrets not configured (need LETTA_API_KEY, LETTA_PROJECT_ID, AGENT_ID)"
          fi

      - name: Set up Node.js
        if: steps.check-secrets.outputs.has-secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install letta-code CLI
        if: steps.check-secrets.outputs.has-secrets == 'true'
        run: npm install -g @letta-ai/letta-code

      - name: Install uv
        if: steps.check-secrets.outputs.has-secrets == 'true'
        uses: astral-sh/setup-uv@v7.6.0

      - name: Set up Python
        if: steps.check-secrets.outputs.has-secrets == 'true'
        run: uv python install 3.11

      - name: Install dependencies
        if: steps.check-secrets.outputs.has-secrets == 'true'
        run: uv sync --no-install-project --extra test

      - name: Run Letta Evals suite
        if: steps.check-secrets.outputs.has-secrets == 'true'
        env:
          LETTA_API_KEY: ${{ secrets.LETTA_API_KEY }}
          LETTA_PROJECT_ID: ${{ secrets.LETTA_PROJECT_ID }}
          AGENT_ID: ${{ secrets.AGENT_ID }}
        run: |
          cd tests/evals
          uv run --no-project letta-evals run suite.yaml
