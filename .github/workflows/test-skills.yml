name: Test Dragster Skills

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SKILL.md format
        run: |
          find skills -name "SKILL.md" | while read skill_file; do
            echo "Checking $skill_file..."
            # Check for required frontmatter
            if ! grep -q "^name:" "$skill_file"; then
              echo "❌ Missing 'name' in frontmatter: $skill_file"
              exit 1
            fi
            if ! grep -q "^description:" "$skill_file"; then
              echo "❌ Missing 'description' in frontmatter: $skill_file"
              exit 1
            fi
            echo "✓ $skill_file valid"
          done

      - name: Validate workspace symlink strategy
        run: |
          test -L .skills || (echo "❌ .skills must be a symlink to skills/" && exit 1)
          test "$(readlink .skills)" = "skills" || (echo "❌ .skills should link to skills" && exit 1)
          test -L .agents/skills || (echo "❌ .agents/skills must be a symlink" && exit 1)
          test "$(readlink .agents/skills)" = "../skills" || (echo "❌ .agents/skills should link to ../skills" && exit 1)
          echo "✓ workspace skill symlinks valid"

  integration-letta-evals:
    # Optional integration gate: only runs when secrets are configured.
    if: ${{ secrets.LETTA_API_KEY != '' && secrets.AGENT_ID != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run manual skill test script (API-backed)
        env:
          LETTA_API_KEY: ${{ secrets.LETTA_API_KEY }}
          AGENT_ID: ${{ secrets.AGENT_ID }}
        run: uv run python tests/test_skills_manual.py

      - name: Run Letta Evals suite (API-backed)
        if: hashFiles('tests/evals/suite.yaml') != ''
        env:
          LETTA_API_KEY: ${{ secrets.LETTA_API_KEY }}
          AGENT_ID: ${{ secrets.AGENT_ID }}
        run: |
          cd tests/evals
          uv run letta-evals run suite.yaml
