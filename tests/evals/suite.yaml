name: dragster-skills-eval
description: Evaluation suite for Dragster skills (liteparse, setup-knowledge-base, search-knowledge-base)

# Test dataset
dataset: dataset.jsonl

# Target: Use an existing agent (set via AGENT_ID env var or default)
target:
  kind: letta_agent
  agent_id: ${AGENT_ID}
  base_url: https://api.letta.com
  api_key: ${LETTA_API_KEY}

# Graders
graders:
  # Check if the correct skill was invoked
  skill_invoked:
    kind: tool
    function: contains
    extractor: last_assistant

# Pass/fail gate
gate:
  kind: simple
  metric_key: skill_invoked
  aggregation: accuracy
  op: gte
  value: 0.8  # 80% of tests must pass
